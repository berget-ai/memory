apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory
  labels:
    app: memory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: memory
  template:
    metadata:
      labels:
        app: memory
    spec:
      containers:
        - name: memory
          image: ghcr.io/berget-ai/memory:1.0.0
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 2222
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: SSH_PORT
              value: "2222"
            - name: EMBEDDING_BASE_URL
              value: "https://api.berget.ai/v1"
            - name: EMBEDDING_MODEL
              value: "text-embedding-3-small"
            - name: EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: memory-secrets
                  key: EMBEDDING_API_KEY
                  optional: true
          envFrom:
            - secretRef:
                name: memory-secrets
          volumeMounts:
            - name: ssh-host-key
              mountPath: /app/ssh-keys
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: ssh-host-key
          secret:
            secretName: memory-ssh-host-key
            defaultMode: 0600
      imagePullSecrets:
        - name: regcred
