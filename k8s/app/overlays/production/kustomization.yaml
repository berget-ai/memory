apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: berget-memory

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
  - path: ingress-patch.yaml

images:
  - name: ghcr.io/berget-ai/memory
    newTag: 1.0.0 # {"$imagepolicy": "flux-system:memory-production:tag"}

labels:
  - pairs:
      environment: production
    includeSelectors: false
