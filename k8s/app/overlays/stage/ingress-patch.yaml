apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memory
spec:
  tls:
    - hosts:
        - memory.stage.berget.ai
      secretName: memory-tls
  rules:
    - host: memory.stage.berget.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: memory
                port:
                  number: 80
