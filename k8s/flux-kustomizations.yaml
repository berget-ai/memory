# FluxCD Kustomizations for memory service
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: memory-stage
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/app/overlays/stage
  prune: true
  sourceRef:
    kind: GitRepository
    name: memory
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: memory-production
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/app/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: memory
