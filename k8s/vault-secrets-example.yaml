# Vault Secrets Operator - External Secrets Example
# 
# This shows how to sync secrets from Vault to Kubernetes.
# Apply this after setting up External Secrets Operator and Vault connection.
#
# Required secrets in Vault:
#   - aws.access-key-id
#   - aws.secret-access-key
#   - ssh.host-key (PEM-encoded SSH host private key)

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: memory-secrets
  namespace: berget-memory
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: memory-secrets
    creationPolicy: Owner
  data:
    - secretKey: aws.access-key-id
      remoteRef:
        key: berget/memory
        property: aws.access-key-id
    - secretKey: aws.secret-access-key
      remoteRef:
        key: berget/memory
        property: aws.secret-access-key

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: memory-ssh-host-key
  namespace: berget-memory
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: memory-ssh-host-key
    creationPolicy: Owner
  data:
    - secretKey: ssh_host_rsa_key
      remoteRef:
        key: berget/memory/ssh
        property: host-key
