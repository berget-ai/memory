# Vault Secrets Operator - External Secrets Example
#
# This shows how to sync secrets from Vault to Kubernetes.
# Apply this after setting up External Secrets Operator and Vault connection.
#
# The secret keys are mapped 1:1 to environment variable names.
# Use UPPERCASE_WITH_UNDERSCORE format for secret keys.
#
# Required secrets in Vault (path: berget/memory):
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - SSH_HOST_KEY (PEM-encoded SSH host private key)

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: memory-secrets
  namespace: berget-memory
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: memory-secrets
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: berget/memory
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: berget/memory
        property: AWS_SECRET_ACCESS_KEY

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: memory-ssh-host-key
  namespace: berget-memory
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: memory-ssh-host-key
    creationPolicy: Owner
  data:
    - secretKey: ssh_host_rsa_key
      remoteRef:
        key: berget/memory
        property: SSH_HOST_KEY
